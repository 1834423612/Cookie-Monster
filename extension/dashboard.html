<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Monster Workspace</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="workspace-shell">
      <header class="workspace-header">
        <div>
          <h1>Cookie Monster 本地工作台</h1>
          <p>单页面完成扫描、筛选、展开查看与删除。所有 cookie 内容仅在本地扩展内处理。</p>
        </div>
        <div class="header-meta">
          <span class="meta-pill">v<span id="version">0.1.0</span></span>
          <span class="meta-pill">ID <code id="extension-id">...</code></span>
        </div>
      </header>

      <section id="status" class="status" data-tone="info">正在加载本地状态...</section>

      <section class="command-bar">
        <button id="scan-button" class="primary">刷新罐子</button>
        <button id="recommend-select-button" class="secondary">自动选择推荐可删</button>
        <button id="clear-selection-button" class="secondary">清空选择</button>
        <button id="delete-selected-button" class="danger">删除已选</button>
        <button id="restore-button" class="secondary">恢复上次删除</button>
        <button id="export-report-button" class="secondary">导出摘要</button>
        <button id="export-backup-button" class="secondary">导出备份</button>
      </section>

      <section class="workspace-grid">
        <aside class="jar-pane panel">
          <button id="jar-toggle-button" class="jar-button" aria-expanded="false">
            <span class="jar-icon">🍪</span>
            <span>
              <strong>点我打开饼干罐</strong>
              <small>展开后在右侧展示完整列表</small>
            </span>
          </button>
          <div class="jar-stats">
            <article>
              <span>总 cookies</span>
              <strong id="total-cookies">0</strong>
            </article>
            <article>
              <span>站点域名</span>
              <strong id="total-domains">0</strong>
            </article>
            <article>
              <span>推荐可删</span>
              <strong id="total-recommended">0</strong>
            </article>
          </div>
          <div class="privacy-note">
            <strong>隐私承诺</strong>
            <p>这里展示的值预览、域名分组、删除判断全部在本地运行，不上传任何原始 cookie。</p>
          </div>
        </aside>

        <section class="list-pane panel">
          <div class="list-header">
            <div>
              <h2>Cookie 列表</h2>
              <p>点击域名展开下拉栏查看具体 cookie 内容、标签与删除建议。</p>
            </div>
            <div class="monster">👾</div>
          </div>

          <div class="filters">
            <input id="domain-filter" type="search" placeholder="筛选域名或 cookie 名称" />
            <select id="risk-filter">
              <option value="all">全部风险等级</option>
              <option value="high">仅高风险</option>
              <option value="medium">仅中风险</option>
              <option value="low">仅低风险</option>
            </select>
            <select id="label-filter">
              <option value="all">全部标签</option>
              <option value="recommended">推荐删除</option>
              <option value="critical">保护（重要）</option>
              <option value="session">会话类</option>
            </select>
          </div>

          <div id="cookie-list" class="domain-list">
            <p class="empty">请点击左侧罐子加载 cookie 列表。</p>
          </div>
        </section>
      </section>

      <section class="panel footer-panel">
        <div><strong id="cleanup-count">0</strong> 个删除批次已保存在本地回收站</div>
        <div id="cleanup-meta">暂无删除记录</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
