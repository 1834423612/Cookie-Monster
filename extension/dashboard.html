<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Monster Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="view-dashboard">
    <div class="popup-container">
      <!-- Header -->
      <header class="popup-header">
        <div class="header-left">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </div>
          <span class="logo-text">Cookie Monster Dashboard</span>
        </div>
        <span class="footer-version">v<span id="version">0.1.0</span></span>
      </header>

      <!-- Status Bar -->
      <div id="status-bar" class="status-bar" data-tone="info">
        <div class="status-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </div>
        <span id="status-text">Loading...</span>
      </div>

      <!-- Dashboard Stats -->
      <div class="dashboard-stats">
        <div class="dashboard-stat">
          <div class="dashboard-stat-value" id="total-cookies">0</div>
          <div class="dashboard-stat-label">Total Cookies</div>
        </div>
        <div class="dashboard-stat">
          <div class="dashboard-stat-value" id="total-domains">0</div>
          <div class="dashboard-stat-label">Domains</div>
        </div>
        <div class="dashboard-stat">
          <div class="dashboard-stat-value" id="high-risk-count">0</div>
          <div class="dashboard-stat-label">High Risk</div>
        </div>
        <div class="dashboard-stat">
          <div class="dashboard-stat-value" id="cleanup-count">0</div>
          <div class="dashboard-stat-label">In Recycle Bin</div>
        </div>
      </div>

      <!-- Dashboard Grid -->
      <div class="dashboard-grid">
        <!-- Actions Card -->
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <span class="dashboard-card-title">Local Actions</span>
          </div>
          <div class="quick-actions" style="grid-template-columns: repeat(3, 1fr); gap: 8px;">
            <button id="scan-button" class="primary-action-btn" style="grid-column: span 3;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
              <span>Run Full Scan</span>
            </button>
            <button id="cleanup-button" class="action-btn danger">Clean High Risk</button>
            <button id="restore-button" class="action-btn">Restore</button>
            <button id="open-sidepanel-button" class="action-btn">Side Panel</button>
          </div>
        </div>

        <!-- Export Card -->
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <span class="dashboard-card-title">Export Data</span>
          </div>
          <div class="export-row" style="grid-template-columns: 1fr 1fr;">
            <button id="export-report-button" class="export-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              <span>Export Report</span>
            </button>
            <button id="export-backup-button" class="export-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span>Export Backup</span>
            </button>
          </div>
          <p style="margin-top: 12px; font-size: 11px; color: var(--text-muted);">
            Extension ID: <code id="extension-id" style="background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;">loading...</code>
          </p>
        </div>
      </div>

      <!-- Pending Request Section -->
      <div id="pending-section" class="section" hidden>
        <div class="section-header">
          <span class="section-title">Website Request</span>
          <span class="badge" id="pending-badge">1</span>
        </div>
        <div id="pending-request-panel" class="request-card">
          <div class="request-info">
            <strong id="pending-request-title">Cleanup Request</strong>
            <p id="pending-request-description"></p>
            <span class="request-meta" id="pending-request-meta"></span>
          </div>
          <div class="request-actions">
            <button id="confirm-request-button" class="btn-confirm">Confirm</button>
            <button id="dismiss-request-button" class="btn-dismiss">Dismiss</button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="popup-footer">
        <span class="footer-version">Local Dashboard</span>
        <span class="footer-scan">Last scan: <span id="last-scan">Never</span></span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
