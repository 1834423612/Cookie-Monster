<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Monster Sidepanel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell sidepanel">
      <section class="hero">
        <div class="hero-copy">
          <h1>Cookie Monster</h1>
          <p>Jar first, list second. All processing remains local.</p>
        </div>
        <div class="meta-pill">v<span id="version">0.1.0</span></div>
      </section>

      <section id="status" class="status" data-tone="info">Loading local extension state...</section>

      <section class="button-grid">
        <button id="scan-button" class="primary">Run Scan</button>
        <button id="cleanup-button" class="secondary">Feed High-Risk</button>
        <button id="restore-button" class="secondary">Restore Last</button>
        <button id="export-report-button" class="secondary">Export report</button>
        <button id="export-backup-button" class="secondary">Export backup</button>
        <button id="open-dashboard-button" class="secondary">Open Dashboard</button>
      </section>

      <section id="workspace" class="workspace sidepanel-workspace">
        <section id="jar-scene" class="panel jar-scene">
          <button id="jar-toggle-button" class="jar-button" type="button" aria-expanded="false">
            <span class="jar-emoji">🫙</span>
            <strong>Open List</strong>
          </button>
        </section>

        <section class="panel inventory-panel" id="inventory-shell" hidden>
          <div class="panel-header">
            <div>
              <h3>Cookie Inventory</h3>
            </div>
            <button id="inventory-back-button" class="secondary" type="button">Back</button>
          </div>
          <div class="inventory-controls">
            <input id="inventory-search" type="search" placeholder="Filter" />
            <select id="inventory-filter">
              <option value="all">All</option>
              <option value="balanced">Recommended</option>
              <option value="trackers">Trackers</option>
              <option value="highRisk">High risk</option>
              <option value="expired">Expired</option>
              <option value="longLived">Long lived</option>
            </select>
            <button id="inventory-refresh-button" class="secondary" type="button">Refresh</button>
          </div>
          <div id="inventory-summary" class="muted">No inventory loaded yet.</div>
          <div id="inventory-list" class="inventory-list"></div>
        </section>

        <aside id="monster-panel" class="panel monster-panel compact">
          <div class="monster-emoji">👾</div>
          <p>Monster</p>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
