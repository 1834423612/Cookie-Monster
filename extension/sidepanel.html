<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Monster Sidepanel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="workspace-shell sidepanel-shell">
      <header class="workspace-header compact">
        <div>
          <h1>Cookie Monster</h1>
          <p>本地 cookie 清理助手</p>
        </div>
        <span class="meta-pill">v<span id="version">0.1.0</span></span>
      </header>

      <section id="status" class="status" data-tone="info">正在加载本地状态...</section>

      <section class="command-bar compact">
        <button id="scan-button" class="primary">扫描</button>
        <button id="recommend-select-button" class="secondary">选推荐</button>
        <button id="delete-selected-button" class="danger">删已选</button>
        <button id="restore-button" class="secondary">恢复</button>
      </section>

      <section class="panel jar-pane compact">
        <button id="jar-toggle-button" class="jar-button" aria-expanded="false">
          <span class="jar-icon">🍪</span>
          <span><strong>打开饼干罐</strong><small>展开域名列表</small></span>
        </button>
        <div class="jar-stats compact">
          <article><span>总数</span><strong id="total-cookies">0</strong></article>
          <article><span>域名</span><strong id="total-domains">0</strong></article>
          <article><span>推荐</span><strong id="total-recommended">0</strong></article>
        </div>
      </section>

      <section class="panel list-pane compact">
        <div class="filters compact">
          <input id="domain-filter" type="search" placeholder="筛选" />
          <select id="risk-filter">
            <option value="all">全部风险</option><option value="high">高</option><option value="medium">中</option><option value="low">低</option>
          </select>
          <select id="label-filter">
            <option value="all">全部标签</option><option value="recommended">推荐删</option><option value="critical">保护</option><option value="session">会话</option>
          </select>
        </div>
        <div id="cookie-list" class="domain-list"><p class="empty">点击上方饼干罐查看。</p></div>
      </section>

      <section class="panel footer-panel compact">
        <div><strong id="cleanup-count">0</strong> 个本地备份</div>
        <div id="cleanup-meta">暂无记录</div>
        <div>扩展ID: <code id="extension-id">...</code></div>
      </section>

      <div class="sr-only">
        <button id="clear-selection-button"></button>
        <button id="export-report-button"></button>
        <button id="export-backup-button"></button>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
