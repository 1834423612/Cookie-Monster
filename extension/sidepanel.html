<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie Monster Side Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="view-sidepanel">
    <div class="popup-container">
      <!-- Header -->
      <header class="popup-header">
        <div class="header-left">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </div>
          <span class="logo-text">Side Panel</span>
        </div>
        <button id="open-dashboard-button" class="icon-btn" title="Open Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
        </button>
      </header>

      <!-- Status Bar -->
      <div id="status-bar" class="status-bar" data-tone="info">
        <div class="status-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </div>
        <span id="status-text">Loading...</span>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon cookies">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="8" cy="9" r="1" fill="currentColor"/>
              <circle cx="15" cy="8" r="1" fill="currentColor"/>
              <circle cx="10" cy="14" r="1" fill="currentColor"/>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value" id="total-cookies">0</span>
            <span class="stat-label">Cookies</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon domains">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value" id="total-domains">0</span>
            <span class="stat-label">Domains</span>
          </div>
        </div>
        <div class="stat-card warning">
          <div class="stat-icon risk">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value" id="high-risk-count">0</span>
            <span class="stat-label">High Risk</span>
          </div>
        </div>
      </div>

      <!-- Main Action Button -->
      <button id="scan-button" class="primary-action-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span>Scan Cookies</span>
      </button>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button id="cleanup-button" class="action-btn danger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          <span>Clean High Risk</span>
        </button>
        <button id="restore-button" class="action-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          <span>Restore</span>
        </button>
      </div>

      <!-- Pending Request Section -->
      <div id="pending-section" class="section" hidden>
        <div class="section-header">
          <span class="section-title">Website Request</span>
          <span class="badge" id="pending-badge">1</span>
        </div>
        <div id="pending-request-panel" class="request-card">
          <div class="request-info">
            <strong id="pending-request-title">Cleanup Request</strong>
            <p id="pending-request-description"></p>
            <span class="request-meta" id="pending-request-meta"></span>
          </div>
          <div class="request-actions">
            <button id="confirm-request-button" class="btn-confirm">Confirm</button>
            <button id="dismiss-request-button" class="btn-dismiss">Dismiss</button>
          </div>
        </div>
      </div>

      <!-- Recycle Bin Section -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">Recycle Bin</span>
        </div>
        <div class="recycle-info">
          <div class="recycle-stat">
            <span class="recycle-count" id="cleanup-count">0</span>
            <span class="recycle-label">cookies backed up</span>
          </div>
          <span class="recycle-meta" id="cleanup-meta">No backup yet</span>
        </div>
      </div>

      <!-- Export Options -->
      <div class="export-row">
        <button id="export-report-button" class="export-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>Report</span>
        </button>
        <button id="export-backup-button" class="export-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Backup</span>
        </button>
      </div>

      <!-- Footer -->
      <footer class="popup-footer">
        <span class="footer-version">v<span id="version">0.1.0</span></span>
        <span class="footer-scan">Last: <span id="last-scan">Never</span></span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
